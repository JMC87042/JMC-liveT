<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 JMC Global Live Translation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 헤더 */
        .header {
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
        }

        .translation-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .translation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .translation-label {
            font-size: 10px;
            color: #999;
            font-weight: 600;
        }

        .font-controls {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .font-btn {
            width: 24px;
            height: 24px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-btn:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .translation-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.6;
            color: #fff;
            word-break: break-word;
            overflow-y: auto;
            transition: font-size 0.2s;
        }

        /* 컨트롤 패널 */
        .control-panel {
            padding: 12px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .select-label {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        select {
            padding: 8px 10px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
        }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 컨트롤 - TTS, 음량, 속도 */
        .controls-horizontal {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .control-item {
            flex: 1;
            min-width: 65px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 6px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 5px;
        }

        .control-label {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        .tts-control {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            color: #e0e0e0;
        }

        .toggle-switch {
            position: relative;
            width: 32px;
            height: 18px;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #555;
            border-radius: 9px;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #667eea;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            left: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider::after {
            left: 16px;
        }

        .slider-control {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .slider-content {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .slider-input {
            flex: 1;
            height: 2px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .slider-value {
            font-size: 8px;
            color: #667eea;
            min-width: 24px;
            text-align: right;
            font-weight: 600;
        }

        .pip-notice {
            font-size: 9px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            padding: 6px;
            border-radius: 5px;
            border-left: 2px solid #667eea;
            margin-top: 6px;
        }

        /* 푸터 */
        .footer {
            padding: 10px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-content {
            display: flex;
            gap: 6px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            font-size: 10px;
        }

        .footer-text {
            color: #999;
            font-weight: 500;
        }

        .footer-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .footer-link:hover {
            color: #764ba2;
        }

        .brand-info {
            text-align: center;
            font-size: 8px;
            color: #999;
            padding-top: 6px;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <div class="header-title">
                <span>🌍</span>
                <span>JMC Global Live Translation</span>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <div class="translation-box">
                <div class="translation-header">
                    <div class="translation-label">🌐 번역</div>
                    <div class="font-controls">
                        <button class="font-btn" id="fontSmallBtn" title="글자 작게">A-</button>
                        <button class="font-btn" id="fontResetBtn" title="원래대로">M</button>
                        <button class="font-btn" id="fontLargeBtn" title="글자 크게">A+</button>
                    </div>
                </div>
                <div class="translation-text" id="translationText">
                    <div style="text-align: center; padding: 20px; color: #999;">
                        "시작" 버튼을 누르면 실시간 번역이 시작됩니다.
                    </div>
                </div>
            </div>
        </div>

        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <div class="select-group">
                <label class="select-label">언어</label>
                <select id="languageSelect"></select>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="startBtn">🎙️ 시작</button>
                <button class="btn btn-secondary" id="stopBtn" disabled>⏹️ 중지</button>
            </div>

            <!-- TTS, 음량, 속도 -->
            <div class="controls-horizontal">
                <div class="control-item">
                    <div class="control-label">🔊 TTS</div>
                    <div class="tts-control">
                        <label class="toggle-switch">
                            <input type="checkbox" id="ttsToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="control-item">
                    <div class="control-label">음량</div>
                    <div class="slider-control">
                        <div class="slider-content">
                            <input type="range" class="slider-input" id="volumeSlider" min="0" max="100" value="80">
                            <span class="slider-value" id="volumeValue">80%</span>
                        </div>
                    </div>
                </div>

                <div class="control-item">
                    <div class="control-label">속도</div>
                    <div class="slider-control">
                        <div class="slider-content">
                            <input type="range" class="slider-input" id="speedSlider" min="0.5" max="2" step="0.1" value="0.9">
                            <span class="slider-value" id="speedValue">0.9x</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pip-notice">
                💡 TikTok을 PIP 모드로 설정해서 사용하세요!
            </div>
        </div>

        <!-- 푸터 -->
        <div class="footer">
            <div class="footer-content">
                <span class="footer-text">문의</span>
                <span style="color: #555;">|</span>
                <a class="footer-link" href="https://www.tiktok.com/@jemcymusic" target="_blank">🎵 TikTok</a>
                <span style="color: #555;">|</span>
                <a class="footer-link" href="https://open.kakao.com/o/sVLHFnui" target="_blank">💬 Kakao</a>
            </div>
            <div class="brand-info">
                © JMC Global Live Translation
            </div>
        </div>
    </div>

    <script>
        // 국가별 언어 설정
        const languagesByCountry = {
            'KR': { code: 'ko', name: '한국어', tts: 'ko-KR' },
            'JP': { code: 'ja', name: '日本語', tts: 'ja-JP' },
            'CN': { code: 'zh', name: '中文', tts: 'zh-CN' },
            'ES': { code: 'es', name: 'Español', tts: 'es-ES' },
            'FR': { code: 'fr', name: 'Français', tts: 'fr-FR' },
            'DE': { code: 'de', name: 'Deutsch', tts: 'de-DE' },
            'BR': { code: 'pt', name: 'Português', tts: 'pt-BR' },
            'RU': { code: 'ru', name: 'Русский', tts: 'ru-RU' },
            'IT': { code: 'it', name: 'Italiano', tts: 'it-IT' },
            'TR': { code: 'tr', name: 'Türkçe', tts: 'tr-TR' },
            'TH': { code: 'th', name: 'ไทย', tts: 'th-TH' },
            'ID': { code: 'id', name: 'Bahasa Indonesia', tts: 'id-ID' },
            'PH': { code: 'fil', name: 'Filipino', tts: 'fil-PH' },
            'MY': { code: 'ms', name: 'Bahasa Melayu', tts: 'ms-MY' },
            'US': { code: 'en', name: 'English', tts: 'en-US' }
        };

        // 앱 상태
        const app = {
            isListening: false,
            isRecording: false,
            selectedLanguage: 'en',
            selectedLanguageCode: 'en',
            ttsEnabled: true,
            volume: 0.8,
            speed: 0.9,
            fontSizeOffset: 0,
            baseFontSize: 15,
            recognition: null,
            synth: window.speechSynthesis,
            recordingSessionId: null,
            audioChunks: [],
            userCountry: 'US'
        };

        // UI 요소
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const languageSelect = document.getElementById('languageSelect');
        const translationText = document.getElementById('translationText');
        const ttsToggle = document.getElementById('ttsToggle');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSlider = document.getElementById('speedSlider');
        const volumeValue = document.getElementById('volumeValue');
        const speedValue = document.getElementById('speedValue');
        const fontSmallBtn = document.getElementById('fontSmallBtn');
        const fontResetBtn = document.getElementById('fontResetBtn');
        const fontLargeBtn = document.getElementById('fontLargeBtn');

        // IP 기반 국가 감지
        async function detectCountry() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                app.userCountry = data.country_code || 'US';
                console.log('감지된 국가:', app.userCountry);
            } catch (error) {
                console.error('국가 감지 오류:', error);
                app.userCountry = 'US';
            }
        }

        // 언어 메뉴 초기화
        function initializeLanguages() {
            const countryLang = languagesByCountry[app.userCountry];
            const defaultLang = countryLang || languagesByCountry['US'];

            // 드롭다운 생성
            Object.entries(languagesByCountry).forEach(([country, lang]) => {
                const option = document.createElement('option');
                option.value = lang.code;
                option.textContent = lang.name;
                languageSelect.appendChild(option);
            });

            // 기본값 설정
            languageSelect.value = defaultLang.code;
            app.selectedLanguage = defaultLang.code;
            app.selectedLanguageCode = defaultLang.code;

            console.log('기본 언어:', defaultLang.name);
        }

        // Speech Recognition 초기화
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            app.recognition = new SpeechRecognition();
            app.recognition.continuous = true;
            app.recognition.interimResults = false;
            app.recognition.lang = 'ko-KR';
        }

        // 시작 버튼 클릭
        startBtn.addEventListener('click', async () => {
            app.isListening = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            translationText.innerHTML = '';

            // 오디오 권한 요청 + 30초 샘플링
            await startAudioCapture();

            // 음성 인식 시작
            if (app.recognition) {
                app.recognition.start();
                setupRecognitionHandlers();
            }
        });

        // 중지 버튼 클릭
        stopBtn.addEventListener('click', async () => {
            app.isListening = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;

            if (app.recognition) {
                app.recognition.stop();
            }

            translationText.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">방송이 종료되었습니다.</div>';
        });

        // 오디오 캡처 + 30초 샘플링
        async function startAudioCapture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.start(100);

                // 30초 후 완료
                setTimeout(() => {
                    if (mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(track => track.stop());

                        // 샘플 저장
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result.split(',')[1];
                            saveHostSample(base64);
                        };
                        reader.readAsDataURL(new Blob(audioChunks));
                    }
                }, 30000);

            } catch (error) {
                console.error('오디오 캡처 오류:', error);
            }
        }

        // 호스트 샘플 저장
        async function saveHostSample(audioData) {
            try {
                const formData = new FormData();
                formData.append('audio', new Blob([audioData]));
                formData.append('hostUsername', '@host_a');

                const response = await fetch('/api/finalize-sample-recording', {
                    method: 'POST',
                    headers: {
                        'X-Recording-Session-Id': 'local_recording'
                    },
                    body: formData
                });

                console.log('✅ 호스트 샘플 저장됨');
            } catch (error) {
                console.error('샘플 저장 오류:', error);
            }
        }

        // 음성 인식 핸들러
        function setupRecognitionHandlers() {
            app.recognition.onresult = async (event) => {
                let transcript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }

                if (transcript) {
                    console.log('🎤 인식된 음성:', transcript);
                    await translateAndDisplay(transcript);
                }
            };

            app.recognition.onerror = (event) => {
                console.error('음성 인식 오류:', event.error);
            };

            app.recognition.onend = () => {
                if (app.isListening) {
                    app.recognition.start();
                }
            };
        }

        // 번역 및 표시
        async function translateAndDisplay(text) {
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        targetLang: app.selectedLanguage
                    })
                });

                const data = await response.json();
                const translation = data.translation;

                // UI에 표시
                if (translationText.innerHTML === '' || translationText.innerHTML.includes('시작하면')) {
                    translationText.innerHTML = `<div>${translation}</div>`;
                } else {
                    translationText.innerHTML += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(102, 126, 234, 0.1);">${translation}</div>`;
                }

                // TTS 재생
                if (app.ttsEnabled) {
                    speakTranslation(translation);
                }

            } catch (error) {
                console.error('번역 오류:', error);
            }
        }

        // TTS 재생
        function speakTranslation(text) {
            if (!('speechSynthesis' in window)) return;

            const langData = languagesByCountry[Object.keys(languagesByCountry).find(key => languagesByCountry[key].code === app.selectedLanguage)];
            const lang = langData?.tts || 'en-US';

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.volume = app.volume;
            utterance.rate = app.speed;
            utterance.lang = lang;

            app.synth.speak(utterance);
        }

        // 글자 크기 조절
        fontSmallBtn.addEventListener('click', () => {
            app.fontSizeOffset = Math.max(app.fontSizeOffset - 2, -6);
            updateFontSize();
        });

        fontResetBtn.addEventListener('click', () => {
            app.fontSizeOffset = 0;
            updateFontSize();
        });

        fontLargeBtn.addEventListener('click', () => {
            app.fontSizeOffset = Math.min(app.fontSizeOffset + 2, 6);
            updateFontSize();
        });

        function updateFontSize() {
            const newSize = app.baseFontSize + app.fontSizeOffset;
            translationText.style.fontSize = newSize + 'px';
        }

        // 이벤트 리스너
        languageSelect.addEventListener('change', (e) => {
            app.selectedLanguage = e.target.value;
        });

        ttsToggle.addEventListener('change', (e) => {
            app.ttsEnabled = e.target.checked;
        });

        volumeSlider.addEventListener('input', (e) => {
            app.volume = e.target.value / 100;
            volumeValue.textContent = e.target.value + '%';
        });

        speedSlider.addEventListener('input', (e) => {
            app.speed = parseFloat(e.target.value);
            speedValue.textContent = e.target.value + 'x';
        });

        // 초기화
        (async () => {
            await detectCountry();
            initializeLanguages();
        })();
    </script>
</body>
</html>
