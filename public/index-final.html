<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 JMC Global Live Translation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 헤더 */
        .header {
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-controls {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
        }

        /* 메인 콘텐츠 */
        .main-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
        }

        .translation-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .translation-label {
            font-size: 10px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .translation-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.6;
            color: #fff;
            word-break: break-word;
            overflow-y: auto;
        }

        .recording-indicator {
            font-size: 12px;
            color: #ff6b6b;
            font-weight: 600;
            margin-top: 8px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        /* 컨트롤 패널 */
        .control-panel {
            padding: 12px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .select-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .select-label {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        select {
            padding: 8px 10px;
            background: rgba(102, 126, 234, 0.1);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
        }

        .btn-row {
            display: flex;
            gap: 6px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 컨트롤 - TTS, 음량, 속도 */
        .controls-horizontal {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .control-item {
            flex: 1;
            min-width: 65px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 6px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 5px;
        }

        .control-label {
            font-size: 9px;
            color: #999;
            font-weight: 600;
        }

        .tts-control {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            color: #e0e0e0;
        }

        .toggle-switch {
            position: relative;
            width: 32px;
            height: 18px;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #555;
            border-radius: 9px;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #667eea;
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            left: 2px;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider::after {
            left: 16px;
        }

        .slider-control {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .slider-content {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .slider-input {
            flex: 1;
            height: 2px;
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .slider-value {
            font-size: 8px;
            color: #667eea;
            min-width: 24px;
            text-align: right;
            font-weight: 600;
        }

        .pip-notice {
            font-size: 9px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
            padding: 6px;
            border-radius: 5px;
            border-left: 2px solid #667eea;
            margin-top: 6px;
        }

        /* 푸터 */
        .footer {
            padding: 10px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .footer-links {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .footer-link {
            flex: 1;
            min-width: 60px;
            padding: 6px;
            background: rgba(102, 126, 234, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 5px;
            color: #667eea;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }

        .brand-info {
            text-align: center;
            font-size: 8px;
            color: #999;
            padding-top: 6px;
            border-top: 1px solid rgba(102, 126, 234, 0.1);
        }

        /* 초기 화면 */
        .init-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            text-align: center;
            padding: 20px;
        }

        .init-icon {
            font-size: 48px;
        }

        .init-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
        }

        .init-message {
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <div class="header">
            <div class="header-title">
                <span>🌍</span>
                <span>JMC Global Live Translation</span>
            </div>
            <div class="header-controls">
                <button class="icon-btn">ℹ️</button>
                <button class="icon-btn">⚙️</button>
            </div>
        </div>

        <!-- 메인 콘텐츠 -->
        <div class="main-content">
            <div class="translation-box">
                <div class="translation-label">🌐 번역</div>
                <div class="translation-text" id="translationText">
                    <div style="text-align: center; padding: 20px; color: #999;">
                        방송을 시작하면 실시간 번역이 시작됩니다.
                    </div>
                </div>
                <div class="recording-indicator" id="recordingIndicator" style="display: none;">
                    🎤 호스트 샘플 준비 중...
                </div>
            </div>
        </div>

        <!-- 컨트롤 패널 -->
        <div class="control-panel">
            <div class="select-group">
                <label class="select-label">언어</label>
                <select id="languageSelect">
                    <option value="en">🇺🇸 English</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="zh">🇨🇳 中文</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="pt">🇵🇹 Português</option>
                    <option value="ru">🇷🇺 Русский</option>
                    <option value="it">🇮🇹 Italiano</option>
                    <option value="tr">🇹🇷 Türkçe</option>
                    <option value="th">🇹🇭 ไทย</option>
                    <option value="id">🇮🇩 Bahasa Indonesia</option>
                    <option value="fil">🇵🇭 Filipino</option>
                    <option value="ms">🇲🇾 Bahasa Melayu</option>
                </select>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" id="startBtn">🎙️ 방송시작</button>
                <button class="btn btn-secondary" id="stopBtn" disabled>⏹️ 중지</button>
            </div>

            <!-- TTS, 음량, 속도 -->
            <div class="controls-horizontal">
                <div class="control-item">
                    <div class="control-label">🔊 TTS</div>
                    <div class="tts-control">
                        <label class="toggle-switch">
                            <input type="checkbox" id="ttsToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>

                <div class="control-item">
                    <div class="control-label">음량</div>
                    <div class="slider-control">
                        <div class="slider-content">
                            <input type="range" class="slider-input" id="volumeSlider" min="0" max="100" value="80">
                            <span class="slider-value" id="volumeValue">80%</span>
                        </div>
                    </div>
                </div>

                <div class="control-item">
                    <div class="control-label">속도</div>
                    <div class="slider-control">
                        <div class="slider-content">
                            <input type="range" class="slider-input" id="speedSlider" min="0.5" max="2" step="0.1" value="0.9">
                            <span class="slider-value" id="speedValue">0.9x</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pip-notice">
                💡 TikTok을 PIP 모드로 설정해서 사용하세요!
            </div>
        </div>

        <!-- 푸터 -->
        <div class="footer">
            <div class="footer-links">
                <button class="footer-link" onclick="window.open('https://www.tiktok.com/@jemcymusic', '_blank')">🎵 TikTok</button>
                <button class="footer-link" onclick="window.open('https://open.kakao.com/o/sVLHFnui', '_blank')">💬 Kakao</button>
                <button class="footer-link">📧 문의</button>
            </div>
            <div class="brand-info">
                © JMC Global Live Translation
            </div>
        </div>
    </div>

    <script>
        // 앱 상태
        const app = {
            isListening: false,
            isRecording: false,
            selectedLanguage: 'en',
            ttsEnabled: true,
            volume: 0.8,
            speed: 0.9,
            recognition: null,
            synth: window.speechSynthesis,
            recordingSessionId: null,
            recordingStartTime: null,
            audioChunks: [],
            sampleRecorded: false
        };

        // Speech Recognition 초기화
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            app.recognition = new SpeechRecognition();
            app.recognition.continuous = true;
            app.recognition.interimResults = false;
            app.recognition.lang = 'ko-KR';
        }

        // UI 요소
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const languageSelect = document.getElementById('languageSelect');
        const translationText = document.getElementById('translationText');
        const ttsToggle = document.getElementById('ttsToggle');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSlider = document.getElementById('speedSlider');
        const volumeValue = document.getElementById('volumeValue');
        const speedValue = document.getElementById('speedValue');
        const recordingIndicator = document.getElementById('recordingIndicator');

        // 방송시작 버튼 클릭
        startBtn.addEventListener('click', async () => {
            app.isListening = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            translationText.innerHTML = '';

            // 1️⃣ 30초 호스트 음성 샘플 녹음 시작
            await startSampleRecording();

            // 2️⃣ 음성 인식 시작 (즉시!)
            if (app.recognition) {
                app.recognition.start();
                setupRecognitionHandlers();
            }
        });

        // 중지 버튼 클릭
        stopBtn.addEventListener('click', async () => {
            app.isListening = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;

            // 음성 인식 중지
            if (app.recognition) {
                app.recognition.stop();
            }

            // 30초 녹음 중이면 완료 처리
            if (app.isRecording) {
                await finalizeSampleRecording();
            }

            translationText.innerHTML = '<div style="text-align: center; padding: 20px; color: #999;">방송이 종료되었습니다.</div>';
        });

        // 30초 호스트 음성 샘플 녹음 시작
        async function startSampleRecording() {
            try {
                const response = await fetch('/api/start-sample-recording', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: 'API_KEY_A' })
                });

                const data = await response.json();
                app.recordingSessionId = data.recordingSessionId;
                app.isRecording = true;
                app.recordingStartTime = Date.now();
                app.audioChunks = [];

                // 녹음 표시
                recordingIndicator.style.display = 'block';

                console.log('🎤 호스트 샘플 녹음 시작:', app.recordingSessionId);

                // 마이크 접근
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        const reader = new FileReader();
                        reader.onloadend = () => {
                            const base64 = reader.result.split(',')[1];
                            app.audioChunks.push(base64);
                        };
                        reader.readAsDataURL(event.data);
                    }
                };

                mediaRecorder.start(100); // 100ms 단위로 데이터 수집

                // 30초 후 자동 완료
                setTimeout(() => {
                    if (app.isRecording && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        stream.getTracks().forEach(track => track.stop());
                        finalizeSampleRecording();
                    }
                }, 30000);

            } catch (error) {
                console.error('샘플 녹음 오류:', error);
            }
        }

        // 샘플 녹음 완료 및 저장
        async function finalizeSampleRecording() {
            if (!app.isRecording) return;

            try {
                const response = await fetch('/api/finalize-sample-recording', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Recording-Session-Id': app.recordingSessionId
                    },
                    body: JSON.stringify({ hostUsername: '@host_a' })
                });

                const data = await response.json();
                console.log('✅ 호스트 샘플 저장됨:', data);

                app.isRecording = false;
                app.sampleRecorded = true;
                recordingIndicator.style.display = 'none';

            } catch (error) {
                console.error('샘플 저장 오류:', error);
            }
        }

        // 음성 인식 핸들러
        function setupRecognitionHandlers() {
            app.recognition.onresult = async (event) => {
                let transcript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }

                if (transcript) {
                    console.log('🎤 인식된 음성:', transcript);

                    // 번역
                    await translateAndDisplay(transcript);
                }
            };

            app.recognition.onerror = (event) => {
                console.error('음성 인식 오류:', event.error);
            };

            app.recognition.onend = () => {
                if (app.isListening) {
                    app.recognition.start();
                }
            };
        }

        // 번역 및 표시
        async function translateAndDisplay(text) {
            try {
                const targetLang = app.selectedLanguage;

                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        targetLang: targetLang
                    })
                });

                const data = await response.json();
                const translation = data.translation;

                // UI에 표시
                if (translationText.innerHTML === '' || translationText.innerHTML.includes('방송을 시작')) {
                    translationText.innerHTML = `<div>${translation}</div>`;
                } else {
                    translationText.innerHTML += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(102, 126, 234, 0.1);">${translation}</div>`;
                }

                // TTS 재생
                if (app.ttsEnabled) {
                    speakTranslation(translation);
                }

            } catch (error) {
                console.error('번역 오류:', error);
            }
        }

        // TTS로 번역 재생
        function speakTranslation(text) {
            if (!('speechSynthesis' in window)) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.volume = app.volume;
            utterance.rate = app.speed;
            utterance.lang = getLangCode(app.selectedLanguage);

            app.synth.speak(utterance);
        }

        // 언어 코드 변환
        function getLangCode(lang) {
            const langMap = {
                'en': 'en-US',
                'ja': 'ja-JP',
                'zh': 'zh-CN',
                'es': 'es-ES',
                'fr': 'fr-FR',
                'de': 'de-DE',
                'pt': 'pt-BR',
                'ru': 'ru-RU',
                'it': 'it-IT',
                'tr': 'tr-TR',
                'th': 'th-TH',
                'id': 'id-ID',
                'fil': 'fil-PH',
                'ms': 'ms-MY'
            };
            return langMap[lang] || 'en-US';
        }

        // 이벤트 리스너
        languageSelect.addEventListener('change', (e) => {
            app.selectedLanguage = e.target.value;
        });

        ttsToggle.addEventListener('change', (e) => {
            app.ttsEnabled = e.target.checked;
        });

        volumeSlider.addEventListener('input', (e) => {
            app.volume = e.target.value / 100;
            volumeValue.textContent = e.target.value + '%';
        });

        speedSlider.addEventListener('input', (e) => {
            app.speed = parseFloat(e.target.value);
            speedValue.textContent = e.target.value + 'x';
        });
    </script>
</body>
</html>
