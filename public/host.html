<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 JMC Global Live Translation - Host</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px;
        }

        .box-title {
            font-size: 11px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 6px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .status-label {
            color: #999;
        }

        .status-value {
            color: #667eea;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-box {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 6px;
            padding: 8px;
            font-size: 10px;
            color: #2ecc71;
            line-height: 1.5;
        }

        .footer {
            padding: 10px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            font-size: 9px;
            color: #999;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <span>🎤</span>
                <span>JMC HOST MODE - 음성 송신</span>
            </div>
        </div>

        <div class="main-content">
            <!-- 상태 -->
            <div class="box">
                <div class="box-title">📊 상태</div>
                <div class="status-item">
                    <span class="status-label">마이크 상태:</span>
                    <span class="status-value" id="micStatus">❌ 비활성</span>
                </div>
                <div class="status-item">
                    <span class="status-label">음성 녹음:</span>
                    <span class="status-value" id="recordStatus">대기 중</span>
                </div>
                <div class="status-item">
                    <span class="status-label">데이터 전송:</span>
                    <span class="status-value" id="sendStatus">준비 중</span>
                </div>
            </div>

            <!-- 제어 -->
            <div class="box">
                <div class="box-title">⚙️ 제어</div>
                <button class="btn btn-primary" id="startBtn">🎙️ 시작</button>
                <button class="btn btn-secondary" id="stopBtn" disabled>⏹️ 중지</button>
            </div>

            <!-- 정보 -->
            <div class="info-box">
                ✅ "시작"을 누르면 마이크가 활성화됩니다.
                <br>✅ 음성이 자동으로 녹음되어 데이터로 전송됩니다.
                <br>✅ 시청자들이 실시간으로 번역을 받습니다.
            </div>
        </div>

        <div class="footer">
            © JMC Global Live Translation
        </div>
    </div>

    <script>
        const app = {
            isRunning: false,
            mediaStream: null,
            mediaRecorder: null,
            audioChunks: [],
            hostName: 'tnal.sl'
        };

        // URL에서 호스트명 추출
        function getHostFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('host')?.replace('@', '') || 'tnal.sl';
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            app.hostName = getHostFromURL();
            console.log('🎤 호스트명:', app.hostName);
        });

        // 시작 버튼
        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // 마이크 권한 요청
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                app.mediaStream = stream;
                app.audioChunks = [];

                // MediaRecorder 설정
                app.mediaRecorder = new MediaRecorder(stream);

                app.mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        app.audioChunks.push(event.data);
                    }
                };

                app.mediaRecorder.onstop = async () => {
                    // 음성 데이터를 blob으로 변환
                    const audioBlob = new Blob(app.audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();

                    reader.onloadend = async () => {
                        // base64로 인코딩
                        const base64Audio = reader.result.split(',')[1];
                        
                        // 서버로 전송
                        await sendAudioToServer(base64Audio);
                    };

                    reader.readAsDataURL(audioBlob);
                };

                // 녹음 시작 (500ms마다 청크 생성)
                app.mediaRecorder.start(500);

                app.isRunning = true;
                updateUI();
                document.getElementById('micStatus').textContent = '✅ 활성 중';
                document.getElementById('recordStatus').textContent = '🎙️ 녹음 중';
                console.log('🎤 음성 녹음 시작');

            } catch (error) {
                console.error('마이크 오류:', error);
                document.getElementById('micStatus').textContent = '❌ 오류: ' + error.message;
            }
        });

        // 중지 버튼
        document.getElementById('stopBtn').addEventListener('click', () => {
            if (app.mediaRecorder && app.isRunning) {
                app.mediaRecorder.stop();
                app.mediaStream.getTracks().forEach(track => track.stop());
                
                app.isRunning = false;
                updateUI();
                document.getElementById('micStatus').textContent = '❌ 비활성';
                document.getElementById('recordStatus').textContent = '중지됨';
                console.log('🛑 녹음 중지');
            }
        });

        // 음성 데이터 서버 전송
        async function sendAudioToServer(base64Audio) {
            try {
                const response = await fetch('/api/host/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hostName: app.hostName,
                        audioData: base64Audio
                    })
                });

                if (response.ok) {
                    console.log('✅ 음성 데이터 전송됨');
                    document.getElementById('sendStatus').textContent = '✅ 전송됨';
                } else {
                    console.error('전송 실패');
                    document.getElementById('sendStatus').textContent = '❌ 전송 실패';
                }
            } catch (error) {
                console.error('서버 전송 오류:', error);
                document.getElementById('sendStatus').textContent = '❌ 오류';
            }
        }

        // UI 업데이트
        function updateUI() {
            document.getElementById('startBtn').disabled = app.isRunning;
            document.getElementById('stopBtn').disabled = !app.isRunning;
        }
    </script>
</body>
</html>
