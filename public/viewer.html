<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JMC Global Live Translation v1.0</title>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;
  --border:#252530;--border2:#2e2e3e;
  --blue:#4f8ef7;--yellow:#f7c94f;--green:#2ecc71;--red:#e74c3c;
  --text:#e8e8f0;--text2:#8888a0;--text3:#44445a;
  --r:10px;--fs:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-text-size-adjust:100%}
#app{display:flex;flex-direction:column;height:100dvh}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:0 12px;height:36px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;white-space:nowrap;transition:opacity .15s;-webkit-tap-highlight-color:transparent;min-width:44px;min-height:44px}
.btn:active{opacity:.7}
.btn-blue{background:var(--blue);color:#fff}
.btn-ghost{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-sm{height:28px;min-height:28px;padding:0 8px;font-size:11px}
.tog{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0;display:inline-block}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--border2);border-radius:20px;transition:.2s}
.tog-sl:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.tog input:checked+.tog-sl{background:var(--blue)}
.tog input:checked+.tog-sl:before{transform:translateX(16px)}
/* 입장 */
#entry{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:12px}
#entry h1{font-size:17px;font-weight:700;color:var(--blue);text-align:center}
#nick-inp{width:100%;max-width:280px;padding:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-size:16px;text-align:center;outline:none;font-family:inherit}
#nick-inp:focus{border-color:var(--blue)}
#entry-btn{width:100%;max-width:280px;height:48px;font-size:15px}
#entry-err{color:var(--red);font-size:12px;min-height:16px;text-align:center}
/* 메인 */
#main{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}
/* 상단바 */
#topbar{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.title{font-size:10px;font-weight:700;color:var(--blue)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0}
.dot.live{background:var(--red);animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* 컨트롤바 */
#ctrlbar{display:flex;align-items:center;gap:5px;padding:4px 8px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.sep{width:1px;height:16px;background:var(--border2);flex-shrink:0}
#fctrls{display:flex;align-items:center;gap:3px}
#fctrls span{font-size:10px;color:var(--text2);min-width:18px;text-align:center}
.fbtn{width:26px;height:26px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#pip-btn{display:none}
#pip-btn.show{display:inline-flex}
/* 배너 */
#banner{display:none;padding:5px 10px;text-align:center;font-size:11px;flex-shrink:0}
#banner.return{display:block;background:rgba(46,204,113,.1);border-bottom:1px solid rgba(46,204,113,.3);color:var(--green)}
#banner.pip{display:block;background:rgba(79,142,247,.08);border-bottom:1px solid rgba(79,142,247,.2);color:var(--blue)}
#banner.offline{display:block;background:rgba(231,76,60,.08);border-bottom:1px solid rgba(231,76,60,.2);color:var(--red)}
/* 콘텐츠 */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cap-panel{display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--border);flex:0 0 auto;height:100px;min-height:70px}
.cap-hdr{padding:4px 10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;flex-shrink:0}
.cap-hdr.single{color:var(--text2);background:var(--bg2)}
.cap-hdr.blue{color:var(--blue);background:rgba(79,142,247,.07)}
.cap-hdr.yellow{color:var(--yellow);background:rgba(247,201,79,.07)}
.cap-body{flex:1;padding:8px 10px;overflow-y:auto;display:flex;flex-direction:column;justify-content:flex-end;min-height:0}
.cap-text{font-size:var(--fs);line-height:1.5;word-break:break-word;color:var(--text);min-height:28px}
/* 푸터 */
#footer{padding:3px 8px;text-align:center;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.ft-contact{font-size:9px;color:var(--text2);margin-bottom:1px}
.ft-links{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:1px}
.ft-links a{font-size:9px;color:var(--blue);text-decoration:none}
.ft-links a:hover{text-decoration:underline}
.ft-copy{font-size:8px;color:var(--text3)}
/* 채팅 입력 */
#chat-input-wrap{display:flex;gap:5px;padding:5px 8px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
#chat-inp{flex:1;padding:6px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
#chat-inp:focus{border-color:var(--blue)}
#btn-send{padding:6px 12px;border-radius:7px;background:var(--blue);color:#fff;border:none;font-size:12px;cursor:pointer;flex-shrink:0}
/* TTS 승인 배너 */
#tts-approval{display:none;padding:6px 10px;background:rgba(46,204,113,.15);border-top:1px solid rgba(46,204,113,.3);color:var(--green);font-size:11px;text-align:center;flex-shrink:0}
#tts-approval.show{display:block}
/* 채팅 목록 */
#viewer-chat-list{flex:1;overflow-y:auto;padding:4px 8px;display:flex;flex-direction:column;gap:2px;min-height:60px;max-height:120px}
.vcmsg{font-size:12px;padding:2px 6px;border-radius:4px;word-break:break-word;color:var(--text2)}
.vcmsg.mine{color:var(--text)}
#toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);color:#fff;padding:6px 14px;border-radius:20px;font-size:11px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="app">

<!-- 입장 화면 -->
<div id="entry">
  <h1>JMC Global Live Translation v1.0</h1>
  <p id="entry-room" style="font-size:12px;color:var(--text2)">—</p>
  <p id="entry-lang-info" style="font-size:11px;color:var(--text2)">언어 감지 중...</p>
  <input id="nick-inp" type="text" maxlength="20" autocomplete="off" spellcheck="false" placeholder="닉네임">
  <div id="entry-err"></div>
  <div id="entry-device-guide" style="margin:8px 0;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;display:none"></div>
  <button class="btn btn-blue" id="entry-btn" onclick="doEntry()">입장하기</button>
</div>

<!-- 메인 화면 -->
<div id="main">
  <div id="topbar">
    <div>
      <div class="title">JMC Global Live Translation v1.0</div>
      <div style="font-size:10px;color:var(--text2)" id="room-lbl">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:5px;margin-left:auto;flex-wrap:wrap">
      <div class="dot" id="dot"></div>
      <span id="live-txt" style="font-size:11px;font-weight:700">대기 중</span>
      <span id="lang-info" style="font-size:10px;color:var(--text2)">🌐</span>
    </div>
  </div>
  <div id="ctrlbar">
    <button id="btn-mute" onclick="toggleMute()" style="font-size:18px;background:none;border:none;cursor:pointer;padding:0 4px;min-width:32px;min-height:32px;-webkit-tap-highlight-color:transparent">🔊</button>
    <input type="range" id="vol-sl" min="0" max="1" step="0.1" value="1" style="width:55px;height:4px;accent-color:var(--blue)">
    <div class="sep"></div>
    <label style="font-size:10px;color:var(--text2)">속도</label>
    <input type="range" id="rate-sl" min="0.5" max="2" step="0.1" value="1" style="width:55px;height:4px;accent-color:var(--blue)">
    <div class="sep"></div>
    <div id="fctrls">
      <button class="fbtn" onclick="chgFont(-2)">A-</button>
      <span id="fval">22</span>
      <button class="fbtn" onclick="chgFont(2)">A+</button>
    </div>

  </div>
  <div id="banner"></div>
  <div id="content">
    <div class="cap-panel" id="single-panel">
      <div class="cap-hdr single"><span>📡</span><span id="lbl-single">실시간 번역</span></div>
      <div class="cap-body"><div class="cap-text" id="single-cap"></div></div>
    </div>
    <div class="cap-panel" id="a-panel" style="display:none">
      <div class="cap-hdr blue"><span>🔵</span><span id="lbl-host-a">호스트</span></div>
      <div class="cap-body"><div class="cap-text" id="a-cap"></div></div>
    </div>
    <div class="cap-panel" id="b-panel" style="display:none">
      <div class="cap-hdr yellow"><span>🟡</span><span id="lbl-host-b">상대방</span></div>
      <div class="cap-body"><div class="cap-text" id="b-cap"></div></div>
    </div><!-- TTS 승인 배너 -->
    <div id="tts-approval"></div>
    <!-- 채팅 목록 -->
    <div id="viewer-chat-list"></div>
    <!-- 채팅 입력 -->
    <div id="chat-input-wrap">
      <input id="chat-inp" type="text" maxlength="100" placeholder="메시지 입력...">
      <button id="btn-send" onclick="sendChat()">전송</button>
    </div>
    <div id="footer">
    <div class="ft-contact" id="lbl-contact">Contact</div>
    <div class="ft-links">
      <a href="https://www.tiktok.com/@jemcymusic" target="_blank" rel="noopener">TikTok @jemcymusic</a>
      <a href="https://www.youtube.com/@jemcymusic" target="_blank" rel="noopener">YouTube @jemcymusic</a>
      <a href="https://open.kakao.com/o/sVLHFnui" target="_blank" rel="noopener">KakaoTalk</a>
    </div>
    <div class="ft-copy">© 2026 JMC. All rights reserved.</div>
  </div>
</div>
</div>
<div id="toast"></div>

<script>
(function(){
/* ── Firebase 설정 (여기에 본인 설정값 입력) ── */
const FB_CONFIG={
  apiKey:"AIzaSyD0faMYvNiQEYOoFobibXb9yIpZOp12Qq0",
  authDomain:"jmc-global-live-translation.firebaseapp.com",
  databaseURL:"https://jmc-global-live-translation-default-rtdb.firebaseio.com",
  projectId:"jmc-global-live-translation",
  storageBucket:"jmc-global-live-translation.firebasestorage.app",
  messagingSenderId:"1096614053674",
  appId:"1:1096614053674:web:f70af4e8ed639795c40053"
};
const DEMO=!FB_CONFIG.databaseURL;

/* ── 데모 모드 ── */
const bc=DEMO?new BroadcastChannel('jmc_demo'):null;
const _subs={};
function _key(p){return 'jmc__'+p.replace(/\//g,'__');}
function _dSet(p,v){
  localStorage.setItem(_key(p),JSON.stringify(v));
  bc.postMessage({t:'set',p,v});
  (_subs[p]||[]).forEach(f=>f(v));
}
function _dGet(p){const r=localStorage.getItem(_key(p));return r?JSON.parse(r):null;}
function _dOn(p,cb){
  if(!_subs[p])_subs[p]=[];
  cb(_dGet(p));
  _subs[p].push(cb);
  bc.addEventListener('message',e=>{
    if(e.data.t==='set'&&e.data.p===p)cb(e.data.v);
    if(e.data.t==='push'&&e.data.p===p){
      const cur=_dGet(p)||{};cur[e.data.id]=e.data.v;cb(cur);
    }
    if(e.data.t==='rm'&&e.data.p===p)cb(null);
  });
}
async function _dPush(p,v){
  const id='id_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
  const cur=_dGet(p)||{};cur[id]=v;
  localStorage.setItem(_key(p),JSON.stringify(cur));
  bc.postMessage({t:'push',p,id,v});
  (_subs[p]||[]).forEach(f=>f(cur));
  return id;
}

/* ── Firebase 래퍼 ── */
let _db=null,_fbMod=null;
async function initFB(){
  if(DEMO)return;
  const m=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const m2=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js');
  _fbMod=m2;
  const app=m.initializeApp(FB_CONFIG);
  _db=m2.getDatabase(app);
}
async function fbSet(p,v){if(DEMO){_dSet(p,v);return;}await _fbMod.set(_fbMod.ref(_db,p),v);}
function fbOn(p,cb){if(DEMO){_dOn(p,cb);return;}if(!_db||!_fbMod){console.warn('fbOn not ready:'+p);return;}_fbMod.onValue(_fbMod.ref(_db,p),s=>cb(s.exists()?s.val():null));}
async function fbPush(p,v){if(DEMO)return _dPush(p,v);const r=await _fbMod.push(_fbMod.ref(_db,p),v);return r.key;}
async function fbRm(p){if(DEMO){return;}await _fbMod.remove(_fbMod.ref(_db,p));}

/* ── 언어 설정 ── */
const LANGS=[
  {code:'ko',sl:'ko-KR'},{code:'zh-CN',sl:'zh-CN'},{code:'hi',sl:'hi-IN'},{code:'en',sl:'en-US'},

  {code:'th',sl:'th-TH'},{code:'id',sl:'id-ID'},{code:'tr',sl:'tr-TR'},{code:'vi',sl:'vi-VN'},

const FLAGS={ko:'🇰🇷',en:'🇺🇸',ja:'🇯🇵','zh-CN':'🇨🇳',zh:'🇨🇳',hi:'🇮🇳',es:'🇪🇸',pt:'🇧🇷',ru:'🇷🇺',fr:'🇫🇷',de:'🇩🇪',it:'🇮🇹',ar:'🇸🇦',th:'🇹🇭',id:'🇮🇩',tr:'🇹🇷',vi:'🇻🇳',tl:'🇵🇭'};
const CC={KR:'ko',JP:'ja',CN:'zh-CN',TW:'zh-CN',HK:'zh-CN',TH:'th',VN:'vi',ID:'id',US:'en',GB:'en',AU:'en',CA:'en',IN:'hi',PH:'en',SA:'ar',AE:'ar',FR:'fr',DE:'de',ES:'es',BR:'pt',RU:'ru',IT:'it',TR:'tr'};

const LBL={
  ko:{entry:'입장하기',nick:'닉네임',tts:'TTS',vol:'볼륨',rate:'속도',single:'실시간 번역',host_a:'호스트',host_b:'상대방',chat:'채팅',send:'전송',contact:'문의',offline:'방송이 종료되었습니다',waiting:'대기 중',return_banner:'복귀하셨습니다. 이어서 번역됩니다.',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ 무음 스위치를 꺼주세요 (옆면 스위치)'},
  en:{entry:'Enter',nick:'Nickname',tts:'TTS',vol:'Vol',rate:'Speed',single:'Live Translation',host_a:'Host',host_b:'Guest',chat:'Chat',send:'Send',contact:'Contact',offline:'Broadcast ended',waiting:'Waiting',return_banner:'Welcome back. Resuming translation.',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ Please turn off silent mode (side switch)'},
  ja:{entry:'入場',nick:'ニックネーム',tts:'TTS',vol:'音量',rate:'速度',single:'リアルタイム翻訳',host_a:'ホスト',host_b:'相手',chat:'チャット',send:'送信',contact:'お問い合わせ',offline:'配信が終了しました',waiting:'待機中',return_banner:'戻りました。翻訳を再開します。',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ マナーモードをオフにしてください'},

  th:{entry:'เข้าร่วม',nick:'ชื่อเล่น',tts:'TTS',vol:'เสียง',rate:'ความเร็ว',single:'แปลสด',host_a:'โฮสต์',host_b:'อีกฝ่าย',chat:'แชท',send:'ส่ง',contact:'ติดต่อ',offline:'การออกอากาศสิ้นสุดแล้ว',waiting:'กำลังรอ',return_banner:'ยินดีต้อนรับกลับ กำลังแปลต่อ',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ กรุณาปิดโหมดเงียบ'},
  vi:{entry:'Tham gia',nick:'Biệt danh',tts:'TTS',vol:'Âm lượng',rate:'Tốc độ',single:'Dịch trực tiếp',host_a:'Chủ nhà',host_b:'Khách',chat:'Trò chuyện',send:'Gửi',contact:'Liên hệ',offline:'Buổi phát sóng đã kết thúc',waiting:'Đang chờ',return_banner:'Chào mừng trở lại. Tiếp tục dịch.',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ Vui lòng tắt chế độ im lặng'},

  ar:{entry:'دخول',nick:'اسم المستخدم',tts:'TTS',vol:'صوت',rate:'سرعة',single:'ترجمة مباشرة',host_a:'المضيف',host_b:'الضيف',chat:'دردشة',send:'إرسال',contact:'تواصل',offline:'انتهى البث',waiting:'انتظار',return_banner:'مرحباً بعودتك. يستمر الترجمة.',pip_guide:'📱 iPhone: 틱톡을 PIP로 줄이고 이 화면을 전체화면으로 보세요.',mute_warn:'⚠️ يرجى إيقاف وضع الصمت'},
};

/* ── 상태 ── */
let myLang='ko',myFlag='🇰🇷',roomId='',nickname='',viewerId='';
let ttsEnabled=true,vol=1,rate=1;
let fontSize=parseInt(localStorage.getItem('jmc_fs_v')||'22');
let lastTs=0,joinTs=0,isHidden=false,returnTs=0;
let L=LBL.ko;
let ttsUnlocked=false;

function s(id,t){const e=document.getElementById(id);if(e)e.textContent=t;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showBanner(type,msg){
  const b=document.getElementById('banner');
  b.className='';b.textContent=msg;b.classList.add(type);
  if(type!=='offline')setTimeout(()=>{b.className='';},5000);
}

/* ── 언어 감지 ── */
async function detectLang(){
  try{
    const r=await fetch('https://ipapi.co/json/');
    const d=await r.json();
    const code=CC[d.country_code]||'ko';
    myLang=code;myFlag=FLAGS[code]||'🌐';
    L=LBL[code]||LBL.ko;
    document.getElementById('entry-lang-info').textContent=myFlag+' '+myLang.toUpperCase()+' 자동감지';
    applyLabels();
  }catch(e){myLang='ko';myFlag='🇰🇷';}
}

function unlockAudio(){
  if(ttsUnlocked)return;
  ttsUnlocked=true;
  // TTS 워밍업만 - Web Audio/HTML audio는 틱톡 오디오 세션 충돌
  try{
    const dummy=new SpeechSynthesisUtterance(' ');
    dummy.volume=0;dummy.rate=2;
    speechSynthesis.speak(dummy);
  }catch(e){}
}

/* ── 번역 (viewer 자체 처리) ── */
async function viewerTranslate(text,sourceLang){
  // 소스 언어와 내 언어가 같으면 번역 불필요
  if(sourceLang&&(sourceLang===myLang||sourceLang.split('-')[0]===myLang.split('-')[0]))return text;
  try{
    const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang||'auto'}&tl=${myLang}&dt=t&q=${encodeURIComponent(text)}`;
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),2000);
    const r=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    const d=await r.json();
    return d[0].map(x=>x[0]).join('');
  }catch(e){return text;}
}

/* ── 방송 수신 ── */
let lastText='';
function startBroadcastListener(){
  fbOn('rooms/'+roomId+'/broadcast',(data)=>{
    if(!data)return;
    const live=data.isLive;
    document.getElementById('dot').classList.toggle('live',live);
    s('live-txt',live?'LIVE':(L.waiting||'대기 중'));
    if(!live){showBanner('offline',L.offline||'방송이 종료되었습니다');return;}
    document.getElementById('banner').className='';
    if(!data.timestamp)return;
    const ts=data.timestamp||0;
    if(data.interim)return;
    const skipTts=false;
    const text=data.text||'';
    if(!text)return;
    // 중복 방지
    if(ts===lastTs)return;
    lastTs=ts;
    const speaker=data.speaker;
    const sourceLang=data.sourceLang||'auto';
    // 시청자 기기에서 번역 후 표시
    viewerTranslate(text,sourceLang).then(translated=>{
      if(!translated)return;
      lastText=translated;
      // iOS Video PIP Canvas 업데이트
      updatePipText(translated);
      if(speaker==='A'||speaker==='B'){
        document.getElementById('single-panel').style.display='none';
        document.getElementById('a-panel').style.display='flex';
        document.getElementById('b-panel').style.display='flex';
        if(speaker==='A'){
          document.getElementById('a-cap').textContent=translated;
          if(ttsEnabled&&!skipTts)speakTts(translated,1.0,'A');
        }else{
          document.getElementById('b-cap').textContent=translated;
          if(ttsEnabled&&!skipTts)speakTts(translated,0.85,'B');
        }
      }else{
        document.getElementById('single-panel').style.display='flex';
        document.getElementById('a-panel').style.display='none';
        document.getElementById('b-panel').style.display='none';
        document.getElementById('single-cap').textContent=translated;
        if(ttsEnabled&&!skipTts)speakTts(translated,1.0);
      }
    });
  });
}

/* ── TTS ── */
let _bestVoice=null;
let _voicesLoaded=false;

function getBestVoice(langCode){
  const voices=speechSynthesis.getVoices();
  if(!voices.length)return null;
  const lg=LANGS.find(l=>l.code===langCode);
  const sl=lg?lg.sl:langCode;
  const base=sl.split('-')[0].toLowerCase();
  // 후보 목소리 필터링 (해당 언어)
  const candidates=voices.filter(v=>{
    const vl=v.lang.toLowerCase();
    return vl===sl.toLowerCase()||vl.startsWith(base+'-')||vl.startsWith(base+'_');
  });
  if(!candidates.length)return null;
  // 우선순위: Google > Microsoft > Apple > 기타
  const priority=(v)=>{
    const n=v.name.toLowerCase();
    if(n.includes('google'))return 0;
    if(n.includes('microsoft'))return 1;
    if(n.includes('apple'))return 2;
    if(v.localService)return 3;
    return 4;
  };
  candidates.sort((a,b)=>priority(a)-priority(b));
  return candidates[0]||null;
}

function loadVoices(){
  if(_voicesLoaded)return;
  const voices=speechSynthesis.getVoices();
  if(voices.length){_voicesLoaded=true;_bestVoice=getBestVoice(myLang);}
}

// 목소리 로드 이벤트 (Chrome은 비동기 로드)
if(speechSynthesis.onvoiceschanged!==undefined){
  speechSynthesis.onvoiceschanged=()=>{_voicesLoaded=false;loadVoices();};
}

function speakTts(text,pitch,speaker){
  if(!ttsEnabled||!text)return;
  loadVoices();
  const lg=LANGS.find(l=>l.code===myLang);
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lg?lg.sl:myLang;
  // 최적 목소리 적용
  const allVoices=speechSynthesis.getVoices();
  const sl=(lg?lg.sl:myLang).toLowerCase();
  const base=sl.split('-')[0];
  const candidates=allVoices.filter(v=>{
    const vl=v.lang.toLowerCase();
    return vl===sl||vl.startsWith(base+'-')||vl.startsWith(base+'_');
  });
  const priority=(v)=>{
    const n=v.name.toLowerCase();
    if(n.includes('google'))return 0;
    if(n.includes('microsoft'))return 1;
    if(n.includes('apple'))return 2;
    if(v.localService)return 3;
    return 4;
  };
  candidates.sort((a,b)=>priority(a)-priority(b));
  // 매칭 모드: speaker B는 두 번째 목소리 사용 (다른 사람 느낌)
  let voice=null;
  if(speaker==='B'&&candidates.length>=2){
    voice=candidates[1]; // 두 번째 목소리
  }else{
    voice=candidates[0]||null;
  }
  if(voice)u.voice=voice;
  // speaker B는 피치 낙게 해서 다른 사람체림 들림
  const finalPitch=speaker==='B'?0.85:(pitch||1.0);
  u.volume=vol;u.rate=rate;u.pitch=finalPitch;
  speechSynthesis.cancel();
  // iOS Safari: cancel() 직후 speak()가 무시되는 버그 회피
  setTimeout(()=>speechSynthesis.speak(u),50);
}

    }
  });

async function addViewerChatMsg(key,msg){
  // 내 언어로 번역
  let text=msg.text||'';
  if(msg.lang&&msg.lang!==myLang){
    text=await viewerTranslate(msg.text,msg.lang);
  }
  const el=document.createElement('div');
  el.className='vcmsg'+(msg.viewerId===viewerId?' mine':'');
  el.textContent=`${msg.flag||'🌐'} ${msg.nickname||'?'}: ${text}`;

  if(list){
    list.appendChild(el);
    list.scrollTop=list.scrollHeight;
    while(list.children.length>30)list.removeChild(list.firstChild);
  }
}

  const isAndroid=/Android/.test(ua);
  const isIPad=/iPad/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);

    ios:'📱 iPhone: 틱톡을 PIP(작은 창)으로 줄이고 이 화면을 전체화면으로 보세요. 번역 TTS가 끊기지 않아요 😊',

  };

    style.textContent=`:root{--bg:#0a0a0f;--text:#e8e8f0;--blue:#4f8ef7;--yellow:#f7c94f;--red:#e74c3c;--fs:${fontSize}px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;padding:8px;height:100vh;display:flex;flex-direction:column;gap:6px;overflow:hidden}.cap{font-size:var(--fs);line-height:1.5;word-break:break-word;padding:10px;border-radius:8px;background:#18181f;flex:1;overflow-y:auto}.cap.single{border-left:3px solid var(--blue)}.cap.a{border-left:3px solid var(--blue)}.cap.b{border-left:3px solid var(--yellow)}.lbl{font-size:10px;font-weight:700;margin-bottom:3px;color:var(--blue)}.ctrls{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:4px 0;border-top:1px solid #252530;margin-top:auto;flex-shrink:0}.btn{padding:4px 8px;border-radius:6px;border:1px solid #2e2e3e;background:#18181f;color:#e8e8f0;font-size:11px;cursor:pointer}.tog{width:32px;height:18px;position:relative;display:inline-block}.tog input{opacity:0;width:0;height:0;position:absolute}.tog-sl{position:absolute;inset:0;background:#2e2e3e;border-radius:18px;transition:.2s}.tog-sl:before{content:'';position:absolute;width:12px;height:12px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}.tog input:checked+.tog-sl{background:var(--blue)}.tog input:checked+.tog-sl:before{transform:translateX(14px)}input[type=range]{width:50px;height:4px;accent-color:var(--blue)}.lbl2{font-size:10px;color:#8888a0}`;
    pipWin.document.head.appendChild(style);
    pipWin.document.body.innerHTML=`
      <div class="lbl" id="plbl">${L.single||'실시간 번역'}</div>
      <div class="cap single" id="pcap"></div>
      <div class="ctrls">
        <label class="tog"><input type="checkbox" id="ptts" ${ttsEnabled?'checked':''}><span class="tog-sl"></span></label>
        <span class="lbl2">TTS</span>
        <span class="lbl2">볼륨</span>
        <input type="range" id="pvol" min="0" max="1" step="0.1" value="${vol}">
        <span class="lbl2">속도</span>
        <input type="range" id="prate" min="0.5" max="2" step="0.1" value="${rate}">
        <button class="btn" onclick="this.closest('body').dispatchEvent(new CustomEvent('fs',{detail:-2}))">A-</button>
        <button class="btn" onclick="this.closest('body').dispatchEvent(new CustomEvent('fs',{detail:2}))">A+</button>
      </div>`;
    // 컨트롤 동기화
    pipWin.document.getElementById('ptts').addEventListener('change',e=>{ttsEnabled=e.target.checked;document.getElementById('tog-tts').checked=ttsEnabled;if(!ttsEnabled)speechSynthesis.cancel();});
    pipWin.document.getElementById('pvol').addEventListener('input',e=>{vol=parseFloat(e.target.value);document.getElementById('vol-sl').value=vol;});
    pipWin.document.getElementById('prate').addEventListener('input',e=>{rate=parseFloat(e.target.value);document.getElementById('rate-sl').value=rate;});
    pipWin.document.body.addEventListener('fs',e=>{window.chgFont(e.detail);pipWin.document.body.style.setProperty('--fs',fontSize+'px');});
    // 자막 동기화
    const syncPip=()=>{
      const pcap=pipWin.document.getElementById('pcap');
      if(!pcap)return;
      const txt=document.getElementById('single-cap').textContent||document.getElementById('a-cap').textContent||document.getElementById('b-cap').textContent;
      pcap.textContent=txt;
    };
    const obs=new MutationObserver(syncPip);
    ['a-cap','b-cap','single-cap'].forEach(id=>obs.observe(document.getElementById(id),{childList:true,characterData:true,subtree:true}));
    // PIP 사락 시 observer 정리 (메모리 누수 방지)
    pipWin.addEventListener('pagehide',()=>obs.disconnect());
    showToast('PIP 모드 시작됨');
  }catch(e){showToast('PIP 시작 실패: '+e.message);}
}

/* ── iOS Video PIP (Canvas → Video) ── */
let _pipCanvas=null,_pipCtx=null,_pipVideo=null,_pipStream=null,_pipActive=false;
let _pipText='';

function initPipCanvas(){
  if(_pipCanvas)return;
  _pipCanvas=document.createElement('canvas');
  _pipCanvas.width=480;_pipCanvas.height=200;
  _pipCtx=_pipCanvas.getContext('2d');
  _pipStream=_pipCanvas.captureStream(10);
  _pipVideo=document.createElement('video');
  _pipVideo.srcObject=_pipStream;
  _pipVideo.muted=true;
  _pipVideo.playsInline=false; // iOS PIP 요청에 필요
  _pipVideo.setAttribute('playsinline','false');
  _pipVideo.style.position='fixed';
  _pipVideo.style.opacity='0';
  _pipVideo.style.pointerEvents='none';
  _pipVideo.style.width='1px';
  _pipVideo.style.height='1px';
  _pipVideo.style.top='-9999px';
  document.body.appendChild(_pipVideo);
}

function drawPipFrame(){
  if(!_pipCtx||!_pipActive)return;
  const W=_pipCanvas.width,H=_pipCanvas.height;
  const fs=Math.min(fontSize,36);
  _pipCtx.clearRect(0,0,W,H);
  // 배경
  _pipCtx.fillStyle='rgba(10,10,15,0.92)';
  _pipCtx.roundRect(0,0,W,H,16);
  _pipCtx.fill();
  // 자막 텍스트
  _pipCtx.fillStyle='#e8e8f0';
  _pipCtx.font=`600 ${fs}px -apple-system, sans-serif`;
  _pipCtx.textAlign='center';
  _pipCtx.textBaseline='middle';
  // 잡 텍스트 줄바꽔
  const words=_pipText.split(' ');
  const maxW=W-40;
  const lines=[];
  let cur='';
  for(const w of words){
    const test=cur?cur+' '+w:w;
    if(_pipCtx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}else{cur=test;}
  }
  if(cur)lines.push(cur);
  const lineH=fs*1.5;
  const totalH=lines.length*lineH;
  const startY=(H-totalH)/2+lineH/2;
  lines.forEach((line,i)=>_pipCtx.fillText(line,W/2,startY+i*lineH));
  requestAnimationFrame(drawPipFrame);
}

async function startIosPip(){
  initPipCanvas();
  _pipActive=true;
  drawPipFrame();
  try{
    await _pipVideo.play();
    if(_pipVideo.requestPictureInPicture){
      await _pipVideo.requestPictureInPicture();
      showToast('화면 아래 PIP 버튼을 눌러주세요');
    }else{
      showToast('PIP 미지원 브라우저');
    }
  }catch(e){
    showToast('화면 아래 PIP 버튼을 눌러주세요 (비디오 재생 후)');
  }
  _pipVideo.addEventListener('leavepictureinpicture',()=>{_pipActive=false;});
}

// 자막 업데이트 훅 (PIP Canvas에 반영)
function updatePipText(text){
  _pipText=text;
}

window.startPip=async function(){
  if('documentPictureInPicture' in window){
    await startDocumentPip();
  }else{
    await startIosPip();
  }
};

function escHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getRoomId(){const p=new URLSearchParams(location.search);return p.get('room')||'demoroom';}

/* ── 초기화 ── */
(async()=>{
  roomId=getRoomId();
  document.getElementById('entry-room').textContent='Room: '+roomId;
  // 입장 화면 기기별 안내
  (function(){
    const ua=navigator.userAgent;
    const isIOS=/iPad|iPhone|iPod/.test(ua)&&!window.MSStream;
    const isAndroid=/Android/.test(ua);
    const isIPad=/iPad/.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
    const el=document.getElementById('entry-device-guide');
    if(!el)return;
    if(isIOS&&!isIPad){
      el.style.cssText='margin:8px 0;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);color:#ff9500;display:block';
      el.textContent='📱 iPhone: 틱톡을 PIP(작은 창)으로 줄이고 이 화면을 전체화면으로 보세요';
    }else if(isAndroid){
      el.style.cssText='margin:8px 0;padding:8px 10px;border-radius:8px;font-size:11px;line-height:1.5;background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;display:block';
      el.textContent='📱 Android: 화면 분할 — 위쪽 틱톡, 아래쪽 이 화면';
    }
  })();
  await initFB();
  await detectLang();
  applyFont();
  applyChatFont();
  // 번역 API 워밍업 (첫 번역 지연 방지)
  fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=en&dt=t&q=test').catch(()=>{});
})();
})();
</script>
</body>
</html>
