<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 JMC Global Live Translation - Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 14px 16px;
            background: rgba(10, 14, 39, 0.95);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .main-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
        }

        .box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .box-title {
            font-size: 11px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
        }

        .translation-text {
            flex: 1;
            font-size: 18px;
            line-height: 1.6;
            color: #fff;
            word-break: break-word;
            overflow-y: auto;
            padding: 8px;
        }

        .footer {
            padding: 10px;
            background: rgba(10, 14, 39, 0.95);
            border-top: 1px solid rgba(102, 126, 234, 0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-item {
            display: flex;
            gap: 4px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-box {
            font-size: 10px;
            color: #999;
            padding: 6px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 4px;
        }

        .status-text {
            font-size: 10px;
            color: #667eea;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <span>👁️</span>
                <span>JMC VIEWER MODE - 실시간 번역</span>
            </div>
        </div>

        <div class="main-content">
            <div class="box">
                <div class="box-title">🌐 번역</div>
                <div class="translation-text" id="translationText">
                    호스트의 음성을 기다리는 중...
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="control-item">
                <button class="btn btn-primary" id="startBtn">🎧 수신 시작</button>
                <button class="btn btn-secondary" id="stopBtn" disabled>⏹️ 중지</button>
            </div>
            <div class="info-box">
                ✅ "수신 시작"을 누르면 호스트의 음성을 받기 시작합니다.
            </div>
            <div class="status-text" id="statusText">준비 중</div>
        </div>
    </div>

    <script>
        const app = {
            isListening: false,
            hostName: 'tnal.sl',
            pollingInterval: null,
            lastTimestamp: 0
        };

        // URL에서 호스트명 추출
        function getHostFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('host')?.replace('@', '') || 'tnal.sl';
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            app.hostName = getHostFromURL();
            console.log('👁️ 호스트명:', app.hostName);
        });

        // 수신 시작
        document.getElementById('startBtn').addEventListener('click', async () => {
            app.isListening = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('translationText').innerHTML = '';
            document.getElementById('statusText').textContent = '✅ 호스트 음성 대기 중...';

            // 주기적으로 호스트 음성 데이터 요청
            app.pollingInterval = setInterval(async () => {
                if (app.isListening) {
                    await fetchAndProcessAudio();
                }
            }, 500); // 500ms마다 확인

            console.log('👁️ 수신 시작');
        });

        // 중지
        document.getElementById('stopBtn').addEventListener('click', () => {
            app.isListening = false;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            
            if (app.pollingInterval) {
                clearInterval(app.pollingInterval);
            }

            document.getElementById('statusText').textContent = '중지됨';
            console.log('🛑 수신 중지');
        });

        // 호스트 음성 데이터 받기
        async function fetchAndProcessAudio() {
            try {
                const response = await fetch(`/api/viewer/stream/${app.hostName}`);
                const data = await response.json();

                if (data.status === 'ok' && data.audioData) {
                    // 새로운 음성 데이터인지 확인
                    if (data.timestamp > app.lastTimestamp) {
                        app.lastTimestamp = data.timestamp;
                        
                        // base64 데이터를 Blob으로 변환
                        const audioBlob = base64ToBlob(data.audioData, 'audio/webm');
                        
                        // 음성 인식
                        await recognizeAudio(audioBlob);
                    }
                } else {
                    document.getElementById('statusText').textContent = '⏳ 호스트 음성 대기 중...';
                }
            } catch (error) {
                console.error('음성 데이터 수신 오류:', error);
                document.getElementById('statusText').textContent = '❌ 오류';
            }
        }

        // Base64를 Blob으로 변환
        function base64ToBlob(base64, mimeType) {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new Blob([bytes], { type: mimeType });
        }

        // 음성 인식
        async function recognizeAudio(audioBlob) {
            try {
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const audioData = reader.result.split(',')[1];
                    
                    // Web Speech API 사용
                    const context = new (window.AudioContext || window.webkitAudioContext)();
                    const response = await fetch(URL.createObjectURL(audioBlob));
                    const arrayBuffer = await response.arrayBuffer();
                    const audioBuffer = await context.decodeAudioData(arrayBuffer);
                    
                    // 간단한 방법: 음성 데이터를 구글 STT로 전송
                    await sendToSpeechRecognition(audioBlob);
                };
                reader.readAsDataURL(audioBlob);
            } catch (error) {
                console.error('음성 인식 오류:', error);
            }
        }

        // 음성을 텍스트로 변환
        async function sendToSpeechRecognition(audioBlob) {
            try {
                // Web Speech API 사용 (간단함)
                const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'ko-KR';
                recognition.continuous = false;

                recognition.onresult = async (event) => {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }

                    if (transcript) {
                        console.log('🎤 인식된 음성:', transcript);
                        document.getElementById('statusText').textContent = '🌐 번역 중...';
                        
                        // 번역
                        await translateAndDisplay(transcript);
                    }
                };

                recognition.onerror = (event) => {
                    console.log('음성 인식 오류:', event.error);
                };

                // 오디오 재생 및 인식 (브라우저 제약으로 직접 인식 불가)
                // 대신 호스트의 텍스트 데이터를 직접 받는 방식 필요
                // 현재는 간단히 오디오 URL을 출력
                document.getElementById('statusText').textContent = '✅ 음성 수신됨';
            } catch (error) {
                console.error('STT 오류:', error);
            }
        }

        // 번역
        async function translateAndDisplay(text) {
            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        targetLang: 'ko'
                    })
                });

                const data = await response.json();
                const translation = data.translation;

                // 화면에 표시
                const translationBox = document.getElementById('translationText');
                if (translationBox.textContent === '호스트의 음성을 기다리는 중...') {
                    translationBox.innerHTML = `<div>${translation}</div>`;
                } else {
                    translationBox.innerHTML += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(102, 126, 234, 0.1);">${translation}</div>`;
                }

                document.getElementById('statusText').textContent = '✅ 번역됨';
                console.log('✅ 번역:', translation);

                // TTS 재생
                speakTranslation(translation);
            } catch (error) {
                console.error('번역 오류:', error);
            }
        }

        // TTS
        function speakTranslation(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
